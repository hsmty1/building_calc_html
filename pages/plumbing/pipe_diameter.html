<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>配管径の計算</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        /* 入力フォーム */
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; color: #555; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        
        /* 計算ボタン */
        .btn-calc {
            width: 100%; padding: 15px;
            background: linear-gradient(90deg, #4ade80 0%, #16a34a 100%); /* 緑系 */
            color: white; border: none; border-radius: 30px;
            font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: opacity 0.2s;
        }
        .btn-calc:active { opacity: 0.8; }
        
        /* 結果表示エリア */
        .result-box {
            background-color: #f8f9fa; border-radius: 12px;
            padding: 15px; margin-top: 20px; text-align: left;
            border-left: 5px solid #22c55e;
            display: none; /* 初期非表示 */
        }
        .result-item { 
            margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px dashed #ddd; 
            display: flex; justify-content: space-between; align-items: center;
        }
        .result-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        
        .res-label { font-size: 13px; color: #666; font-weight: bold; width: 60%; }
        .res-val { font-size: 20px; font-weight: bold; color: #333; text-align: right; width: 40%; }
        
        /* 操作ボタン */
        .action-btns { display: flex; justify-content: flex-end; margin-bottom: 20px; }
        .btn-link { color: #2563eb; text-decoration: none; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>
    <div class="main-wrapper">
        
        <div class="ad-space ad-top-banner">トップバナー広告</div>

        <div class="content-body">
            
            <div class="app-container">
                <a href="../plumbing.html" class="back-link"><i class="fa-solid fa-chevron-left"></i></a>
                
                <div class="header-icon text-plumbing"><i class="fa-solid fa-faucet"></i></div>
                <h2 class="text-plumbing">配管径の計算</h2>

                <div class="input-group">
                    <label>流量 (L/min)</label>
                    <input type="number" id="flowInput" placeholder="例: 30" step="0.1">
                </div>

                <div class="action-btns">
                    <a onclick="clearAll(); return false;" class="btn-link">クリア</a>
                </div>

                <button class="btn-calc" onclick="calcPipe()">計算する</button>

                <div id="resultBox" class="result-box">
                    <div class="result-item">
                        <span class="res-label">塩化ビニルライニング鋼管</span>
                        <span class="res-val" id="resLining">－ A</span>
                    </div>
                    <div class="result-item">
                        <span class="res-label">硬質ポリ塩化ビニル管</span>
                        <span class="res-val" id="resPVC">－ A</span>
                    </div>
                    <div class="result-item">
                        <span class="res-label">一般配管用ステンレス鋼管</span>
                        <span class="res-val" id="resSus">－ A</span>
                    </div>
                </div>
                
                <p class="footer-note">流量から適切な管径（A呼称）を選定します。</p>
                
                <div class="ad-space ad-mobile ad-mobile-only">広告 (Mobile Only)</div>
            </div>

            <div class="info-container">
                <div class="info-content">
                    <h3>配管径選定について</h3>
                    <p>
                        入力された流量に基づき、各管種の推奨流速範囲などを考慮したサイズを選定します。
                    </p>
                    <ul style="font-size: 14px; color: #666; padding-left: 20px;">
                        <li>ライニング鋼管 (VD/VA)</li>
                        <li>ポリ塩化ビニル管 (VP)</li>
                        <li>ステンレス鋼管 (Su) ※表示はA換算</li>
                    </ul>
                </div>
                <div class="ad-space ad-side-rect">広告 (PC Sidebar Rect)</div>
            </div>

        </div> 

        <div class="ad-space ad-bottom-banner">ボトムバナー広告</div>

    </div>

    <script>
        // --- 画面操作 ---
        function clearAll() {
            document.getElementById('flowInput').value = '';
            document.getElementById('resultBox').style.display = 'none';
        }

        function calcPipe() {
            const val = parseFloat(document.getElementById('flowInput').value);
            
            if (isNaN(val) || val <= 0) {
                alert("正しい流量を入力してください");
                return;
            }

            document.getElementById('resLining').innerText = calcLining(val) + " A";
            document.getElementById('resPVC').innerText = calcPVC(val) + " A";
            document.getElementById('resSus').innerText = calcSus(val) + " A";
            
            document.getElementById('resultBox').style.display = 'block';
        }

        // --- 計算ロジック (Swiftコードより移植) ---

        // 1. 硬質塩化ビニルライニング鋼管
        function calcLining(v) {
            if (v < 4.4) return 15;
            else if (v < 11) return 20;
            else if (v < 23) return 25;
            else if (v < 48) return 32;
            else if (v < 64) return 40;
            else if (v < 150) return 50;
            else if (v < 295) return 65;
            else if (v < 410) return 80;
            else if (v < 730) return 100;
            else if (v < 1150) return 125;
            else if (v < 1600) return 150;
            else if (v < 2800) return 200;
            else if (v < 4500) return 250;
            else if (v < 6200) return 300;
            else return 350;
        }

        // 2. 硬質ポリ塩化ビニル管
        function calcPVC(v) {
            if (v < 2.1) return 10;
            else if (v < 4.1) return 13;
            else if (v < 7.1) return 16;
            else if (v < 13) return 20;
            else if (v < 24) return 25;
            else if (v < 44) return 30;
            else if (v < 85) return 40;
            else if (v < 170) return 50;
            else if (v < 310) return 65;
            else if (v < 430) return 75;
            else if (v < 740) return 100;
            else if (v < 1100) return 125;
            else if (v < 1600) return 150;
            else if (v < 2800) return 200;
            else if (v < 4300) return 250;
            else return 300;
        }

        // 3. 一般配管用ステンレス鋼管
        function calcSus(v) {
            if (v < 2.95) return 10;
            else if (v < 5.8) return 13;
            else if (v < 15) return 20;
            else if (v < 30) return 25;
            else if (v < 48) return 30;
            else if (v < 88) return 40;
            else if (v < 135) return 50;
            else if (v < 230) return 60;
            else if (v < 380) return 75;
            else if (v < 510) return 80;
            else if (v < 860) return 100;
            else if (v < 1400) return 125;
            else if (v < 1800) return 150;
            else if (v < 3150) return 200;
            else if (v < 4800) return 250;
            else return 300;
        }
    </script>
</body>
</html>
