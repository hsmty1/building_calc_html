<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7755195198648116"
     crossorigin="anonymous"></script>
     
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ダクトサイズ計算</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        /* このページ固有のスタイル */
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
            color: #555;
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .btn-calc {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, #a855f7 0%, #3b82f6 100%);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: opacity 0.2s;
        }
        .btn-calc:active { opacity: 0.8; }
        
        .result-box {
            background-color: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
            text-align: left;
            border-left: 5px solid #c084fc;
        }
        .result-title {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 5px;
            color: #333;
        }
        .result-detail {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }
        .error-msg {
            color: #ef4444;
            font-weight: bold;
        }
        
        .form-row {
            display: flex;
            gap: 10px;
        }
        .form-row .input-group {
            flex: 1;
        }
        
        #rectangular-inputs {
            display: none;
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        
        <div class="ad-space ad-top-banner">トップバナー広告</div>

        <div class="content-body">
            <div class="app-container">
                <a href="../hvac.html" class="back-link"><i class="fa-solid fa-chevron-left"></i></a>
                
                <div class="header-icon text-hvac"><i class="fa-solid fa-ruler-combined"></i></div>
                <h2 class="text-hvac">ダクトサイズの計算</h2>

                <div style="margin-bottom: 30px;">
                    <div class="input-group">
                        <label>風量 (m³/h)</label>
                        <input type="number" id="airVolume" placeholder="例: 4000">
                    </div>

                    <div class="input-group">
                        <label>単位圧損 (Pa/m)</label>
                        <input type="number" id="unitPressureLoss" value="1.0" step="0.1">
                    </div>

                    <div class="form-row">
                        <div class="input-group">
                            <label>ダクト形状</label>
                            <select id="ductType" onchange="toggleInputs()">
                                <option value="spiral">スパイラル（丸）</option>
                                <option value="rectangular">角ダクト</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>素材</label>
                            <select id="material">
                                <option value="0.022">亜鉛鉄板</option>
                                <option value="0.020">ステンレス</option>
                                <option value="0.025">塩ビ</option>
                            </select>
                        </div>
                    </div>

                    <div id="rectangular-inputs" class="input-group">
                        <label>アスペクト比上限</label>
                        <input type="number" id="aspectRatio" value="1.5" step="0.1">
                    </div>

                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <a href="#" onclick="clearForm(); return false;" style="color: #3b82f6; text-decoration: none;">クリア</a>
                    </div>

                    <button class="btn-calc" onclick="calculateDuct()">計算する</button>
                </div>

                <div id="resultArea"></div>
                
                <p class="footer-note">計算式：Darcy-Weisbachの式に基づく簡易計算</p>

                <div class="ad-space ad-mobile ad-mobile-only">広告 (Mobile Only)</div>
            </div>

            <div class="info-container">
                <div class="info-content">
                    <h3>計算について</h3>
                    <p>
                        風量と単位摩擦損失から、最適なダクトサイズを選定します。<br>
                        角ダクトの場合は、アスペクト比（長辺/短辺）を考慮して複数の候補を表示します。
                    </p>
                    <ul style="font-size: 14px; color: #666; padding-left: 20px;">
                        <li>空気密度: 1.2 kg/m³</li>
                        <li>摩擦係数: 亜鉛(0.022), SUS(0.020), PVC(0.025)</li>
                    </ul>
                </div>
                <div class="ad-space ad-side-rect">広告 (PC Sidebar Rect)</div>
            </div>
        </div>

        <div class="ad-space ad-bottom-banner">ボトムバナー広告</div>

        <footer style="text-align: center; padding: 20px; font-size: 12px; color: #666; margin-top: 10px;">
            <a href="pages/privacy.html" style="color: #666; text-decoration: none;">プライバシーポリシー</a> | 
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSdn8MAdPVcien8D5XKDsifUt2bgxUL-oJJvTfFkS15uXYLn7A/viewform?usp=header" target="_blank" style="color: #666; text-decoration: none;">お問い合わせ</a>
            <p>&copy; 2026 Setsubi Calc App</p>
        </footer>

    </div>

    <script>
        function toggleInputs() {
            const type = document.getElementById('ductType').value;
            const rectInputs = document.getElementById('rectangular-inputs');
            if (type === 'rectangular') {
                rectInputs.style.display = 'block';
            } else {
                rectInputs.style.display = 'none';
            }
        }

        function clearForm() {
            document.getElementById('airVolume').value = '';
            document.getElementById('unitPressureLoss').value = '1.0';
            document.getElementById('aspectRatio').value = '1.5';
            document.getElementById('resultArea').innerHTML = '';
            document.getElementById('ductType').value = 'spiral';
            toggleInputs();
        }

        function calculateDuct() {
            const resultArea = document.getElementById('resultArea');
            resultArea.innerHTML = '';

            const Qh = parseFloat(document.getElementById('airVolume').value);
            const uPloss = parseFloat(document.getElementById('unitPressureLoss').value);
            const ductType = document.getElementById('ductType').value;
            const friction = parseFloat(document.getElementById('material').value);
            
            if (!Qh || Qh <= 0 || !uPloss || uPloss <= 0) {
                resultArea.innerHTML = '<div class="result-box error-msg">正しい数値を入力してください</div>';
                return;
            }

            const Q = Qh / 3600.0;
            const rho = 1.2;
            let resultsHTML = '';

            if (ductType === 'spiral') {
                let found = null;
                for (let D = 50; D <= 2000; D += 50) {
                    const area = Math.PI * Math.pow(D / 1000.0, 2) / 4.0;
                    const v = Q / area;
                    const De = D / 1000.0;
                    const pLoss = friction * rho * Math.pow(v, 2) / (2 * De);

                    if (pLoss <= uPloss) {
                        found = { w: D, v: v, pLoss: pLoss };
                        break;
                    }
                }
                if (found) {
                    resultsHTML += `
                        <div class="result-box">
                            <div class="result-title">推奨サイズ: ${found.w} mmφ</div>
                            <div class="result-detail">
                                ダクト内風速: ${found.v.toFixed(2)} m/s<br>
                                単位圧力損失: ${found.pLoss.toFixed(3)} Pa/m
                            </div>
                        </div>`;
                } else {
                    resultsHTML = '<div class="result-box error-msg">条件に合うサイズが見つかりませんでした</div>';
                }
            } else {
                const aspMax = parseFloat(document.getElementById('aspectRatio').value);
                if (!aspMax || aspMax < 1.0) {
                    resultArea.innerHTML = '<div class="result-box error-msg">アスペクト比は1.0以上で入力してください</div>';
                    return;
                }
                let allResults = [];
                for (let w = 50; w <= 2000; w += 50) {
                    for (let h = w; h <= 2000; h += 50) {
                        const aspect = h / w;
                        if (aspect > aspMax) break;
                        const area = (w * h) / 1000000.0;
                        const v = Q / area;
                        const De = (2.0 * w * h) / (w + h) / 1000.0;
                        const pLoss = friction * rho * Math.pow(v, 2) / (2 * De);
                        if (pLoss <= uPloss) {
                            allResults.push({ w: w, h: h, aspect: aspect, v: v, pLoss: pLoss, area: area });
                        }
                    }
                }
                const ranges = [
                    { min: aspMax - 0.05, max: aspMax },
                    { min: aspMax - 0.25, max: aspMax - 0.05 },
                    { min: 0.5, max: aspMax - 0.25 }
                ];
                let selected = [];
                ranges.forEach(range => {
                    const filtered = allResults.filter(r => r.aspect > range.min && r.aspect <= range.max);
                    if (filtered.length > 0) {
                        filtered.sort((a, b) => a.area - b.area);
                        selected.push(filtered[0]);
                    }
                });
                const uniqueSelected = [...new Map(selected.map(item => [item.w + 'x' + item.h, item])).values()];
                uniqueSelected.sort((a, b) => a.area - b.area);

                if (uniqueSelected.length > 0) {
                    uniqueSelected.forEach(res => {
                        resultsHTML += `
                            <div class="result-box">
                                <div class="result-title">サイズ: ${res.w} x ${res.h}</div>
                                <div class="result-detail">
                                    アスペクト比: ${res.aspect.toFixed(2)}<br>
                                    ダクト内風速: ${res.v.toFixed(2)} m/s<br>
                                    単位圧力損失: ${res.pLoss.toFixed(3)} Pa/m
                                </div>
                            </div>`;
                    });
                } else {
                    resultsHTML = '<div class="result-box error-msg">条件に合うサイズが見つかりませんでした</div>';
                }
            }
            resultArea.innerHTML = resultsHTML;
        }
    </script>
</body>
</html>
